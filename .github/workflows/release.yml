name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build binary
        run: wails build -tags webkit2_41

      - name: Package deb
        run: nfpm package -p deb -t .

      - name: Package rpm
        run: nfpm package -p rpm -t .

      - name: Install Flatpak tooling
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          # Add Flathub remote so we can fetch the GNOME runtime/SDK (not uploading)
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --repo=flatpak-repo \
            flatpak-build build/linux/io.github.deskotp.deskOTP.yml
          flatpak build-bundle flatpak-repo \
            deskOTP-${VERSION}-x86_64.flatpak io.github.deskotp.deskOTP

      - name: Generate SHA256SUMS
        run: |
          sha256sum build/bin/deskOTP *.deb *.rpm *.flatpak > SHA256SUMS
          sed -i 's|build/bin/||' SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "deskOTP v${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            build/bin/deskOTP
            *.deb
            *.rpm
            *.flatpak
            SHA256SUMS
